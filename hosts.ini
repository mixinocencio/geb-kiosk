# Arquitetura: cada contexto (Fábrica, RH, Campanhas…) é um grupo; url_kiosk vem só de [grupo:vars].
# O supergrupo [quiosques:children] agrega os contextos; [quiosques:vars] concentra conexão/sudo.

[quiosques_fabrica]
VGP-QKFBDKPD001 ansible_host=192.168.14.143

[quiosques_rh]
# Insira futuras maquinas de RH aqui

[quiosques:children]
quiosques_fabrica
quiosques_rh

[quiosques_fabrica:vars]
url_kiosk="[COLE_AQUI_A_URL_DA_FABRICA]"

[quiosques_rh:vars]
url_kiosk="[COLE_AQUI_A_URL_DO_RH]"

[quiosques:vars]
ansible_user=administrador
ansible_ssh_pass=Cd@3035
ansible_become_pass=Cd@3035
