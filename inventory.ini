# =============================================================================
# Inventário — Quiosques Linux EBEG (Ansible)
# =============================================================================
# Como usar:
# 1) Cadastre cada host no grupo de uso correto (ex.: [matriz_fac], [matriz_cor]).
# 2) Alias do host deve seguir: kiosk-<unidade>-<uso>-<id> (ex.: kiosk-matriz-fac-01).
# 3) O playbook roda no supergrupo [kiosks:children].
# 4) Variáveis por grupo de uso ficam em group_vars/<grupo>.yml.
#
# Segurança:
# - Credenciais SSH: prefira ~/.ssh/config do operador ou ansible-vault em
#   arquivos de vars separados — não commite chaves ou senhas aqui.
# - Deploy é non-interactive: hostname/ID são extraídos do alias do host.
# =============================================================================

[kiosks:children]
matriz
filial_01

[matriz:children]
matriz_fac
matriz_cor

[filial_01:children]
filial_01_fac
filial_01_cor

[matriz_fac]
# Exemplo de quiosque da MATRIZ:
kiosk-matriz-fac-01 ansible_host=SUBSTITUA_IP_MATRIZ_01 ansible_user=SUBSTITUA_USUARIO_SSH

[matriz_cor]
# Exemplo de quiosque corporativo da MATRIZ:
kiosk-matriz-cor-01 ansible_host=SUBSTITUA_IP_MATRIZ_COR_01 ansible_user=SUBSTITUA_USUARIO_SSH

[filial_01_fac]
# Exemplo de quiosque de fábrica da FILIAL 01:
kiosk-filial01-fac-01 ansible_host=SUBSTITUA_IP_FILIAL01_FAC_01 ansible_user=SUBSTITUA_USUARIO_SSH

[filial_01_cor]
# Exemplo de quiosque corporativo da FILIAL 01:
kiosk-filial01-cor-01 ansible_host=SUBSTITUA_IP_FILIAL01_COR_01 ansible_user=SUBSTITUA_USUARIO_SSH
