---
# EBEG — Provisionamento de Quiosque Linux (LightDM + Chromium)
# Idempotente: apt, usuário, templates e permissões podem ser reexecutados com segurança.
# Não armazene segredos neste repositório; use inventário / vars cifrados / Vault quando necessário.

- name: Aplicar baseline de quiosque
  hosts: kiosks
  become: true
  gather_facts: true
  vars:
    kiosk_account_name: kioskuser
    kiosk_account_group: kioskuser
    kiosk_script_path: /usr/local/lib/ebeg-kiosk/kiosk-launch.sh
    kiosk_session_path: /usr/local/lib/ebeg-kiosk/kiosk-session.sh
    kiosk_lightdm_snippet: /etc/lightdm/lightdm.conf.d/99-ebeg-kiosk.conf
    kiosk_xsession_desktop: /usr/share/xsessions/ebeg-kiosk.desktop
    kiosk_packages:
      - lightdm
      - xserver-xorg-core
      - openbox
      - unclutter
      - dbus-x11
      - "{{ kiosk_chromium_package | default('chromium-browser') }}"
  pre_tasks:
    - name: Normalizar alias do host (inventário)
      ansible.builtin.set_fact:
        kiosk_alias_hostname: "{{ inventory_hostname | lower | trim }}"

    - name: Validar padrão de alias conforme grupo
      ansible.builtin.assert:
        that:
          - kiosk_unidade_slug is defined
          - kiosk_tipo_slug is defined
          - kiosk_alias_prefix is defined
          - kiosk_alias_hostname is match('^' ~ kiosk_alias_prefix ~ '-' ~ kiosk_unidade_slug ~ '-' ~ kiosk_tipo_slug ~ '-[a-z0-9]+$')
        fail_msg: >-
          Alias inválido no inventário. Use o padrão:
          {{ kiosk_alias_prefix }}-{{ kiosk_unidade_slug }}-{{ kiosk_tipo_slug }}-NN
          (ex.: kiosk-matriz-fac-01).

    - name: Extrair ID e montar hostname final a partir do alias
      ansible.builtin.set_fact:
        kiosk_equipamento_id: "{{ kiosk_alias_hostname.split('-') | last | upper }}"
        kiosk_hostname: "{{ kiosk_alias_hostname | upper }}"

    - name: Garantir que URL da sessão foi definida no group_vars do grupo
      ansible.builtin.assert:
        that:
          - kiosk_start_url is defined
          - kiosk_start_url | length > 0
          - kiosk_start_url is match('^https://')
        fail_msg: >-
          Defina kiosk_start_url no group_vars do grupo de uso (ex.: group_vars/matriz_fac.yml)
          (apenas caminhos https aprovados; nunca usuário/senha na URL).

    - name: Validar sistema operacional suportado
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >-
          Este playbook base foi padronizado para distribuições Debian/Ubuntu.
          Ajuste o gerenciamento de pacotes antes de usar em outra família Linux.

    - name: Exibir hostname calculado
      ansible.builtin.debug:
        msg: "Hostname alvo calculado: {{ kiosk_hostname }}"

  tasks:
    - name: Instalar pacotes base do quiosque
      ansible.builtin.apt:
        name: "{{ kiosk_packages }}"
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Definir hostname do sistema
      ansible.builtin.hostname:
        name: "{{ kiosk_hostname }}"

    - name: Atualizar /etc/hosts com nome canônico local
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1\s'
        line: "127.0.1.1\t{{ kiosk_hostname }} {{ kiosk_hostname.split('-') | last }} {{ kiosk_hostname | lower }}"
        insertafter: '^127\.0\.0\.1\s'
        create: false
        mode: "0644"
        owner: root
        group: root

    - name: Criar grupo dedicado do quiosque
      ansible.builtin.group:
        name: "{{ kiosk_account_group }}"
        system: true
        state: present

    - name: Criar usuário dedicado (sem shell interativo)
      ansible.builtin.user:
        name: "{{ kiosk_account_name }}"
        group: "{{ kiosk_account_group }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: true
        home: /home/{{ kiosk_account_name }}
        password_lock: true

    - name: Diretório de implantação EBEG (root, não world-writable)
      ansible.builtin.file:
        path: /usr/local/lib/ebeg-kiosk
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Instalar script de sessão X11 / LightDM
      ansible.builtin.template:
        src: templates/kiosk-session.j2
        dest: "{{ kiosk_session_path }}"
        owner: root
        group: root
        mode: "0755"

    - name: Instalar script de inicialização do Chromium
      ansible.builtin.template:
        src: templates/kiosk-script.j2
        dest: "{{ kiosk_script_path }}"
        owner: root
        group: root
        mode: "0755"

    - name: Desktop session registrada no sistema
      ansible.builtin.copy:
        dest: "{{ kiosk_xsession_desktop }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Desktop Entry]
          Version=1.0
          Name=EBEG Kiosk
          Comment=Sessão dedicada Chromium (LightDM)
          Exec={{ kiosk_session_path }}
          Type=Application
          X-LightDM-DesktopName=ebeg-kiosk

    - name: Garantir diretório de snippets do LightDM
      ansible.builtin.file:
        path: /etc/lightdm/lightdm.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configurar autologin LightDM para o usuário quiosque
      ansible.builtin.copy:
        dest: "{{ kiosk_lightdm_snippet }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Seat:*]
          autologin-user={{ kiosk_account_name }}
          autologin-session=ebeg-kiosk
          user-session=ebeg-kiosk
      notify: Reiniciar LightDM

    - name: Garantir permissões do home do usuário quiosque
      ansible.builtin.file:
        path: "/home/{{ kiosk_account_name }}"
        state: directory
        owner: "{{ kiosk_account_name }}"
        group: "{{ kiosk_account_group }}"
        mode: "0750"

  handlers:
    - name: Reiniciar LightDM
      ansible.builtin.service:
        name: lightdm
        state: restarted
