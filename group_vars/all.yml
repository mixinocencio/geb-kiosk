---
# Variáveis globais aplicadas para todos os grupos/hosts de quiosque.

# Prefixo obrigatório do alias no inventário.
kiosk_alias_prefix: "kiosk"

# Pacotes/binário Chromium (ajuste conforme imagem Linux).
kiosk_chromium_package: "chromium-browser"
# kiosk_chromium_binary: "/usr/bin/chromium-browser"

# Flags extras opcionais e controladas por mudança aprovada.
kiosk_chromium_extra_flags: ""
